<!DOCTYPE html>
<html>
<head>
  <title>Snake</title>
  <style>
    body { display: flex; flex-direction: column;
           align-items: center; background: #1a1a2e; }
    #score { color: white; font-size: 20px;
             font-family: monospace; margin: 10px; }
    canvas { border: 2px solid white; }
  </style>
</head>
<body>
  <div id="score">0</div>
  <canvas id="gameCanvas" width="300" height="300"></canvas>
  <script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');

    let dx = 10, dy = 0, score = 0;
    let foodX, foodY, changingDirection = false;

    let snake = [
        {x:150,y:150},{x:140,y:150},
        {x:130,y:150},{x:120,y:150},{x:110,y:150}
    ];

    function clearCanvas() {
        ctx.fillStyle = '#1a1a2e';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
    }

    function drawSnakePart(part) {
        ctx.fillStyle = 'lightgreen';
        ctx.strokeStyle = 'darkgreen';
        ctx.fillRect(part.x, part.y, 10, 10);
        ctx.strokeRect(part.x, part.y, 10, 10);
    }

    function drawSnake() { snake.forEach(drawSnakePart); }

    function drawFood() {
        ctx.fillStyle = 'red';
        ctx.strokeStyle = 'darkred';
        ctx.fillRect(foodX, foodY, 10, 10);
        ctx.strokeRect(foodX, foodY, 10, 10);
    }

    function randomTen(min, max) {
        return Math.round((Math.random() * (max - min) + min) / 10) * 10;
    }

    function createFood() {
        foodX = randomTen(0, canvas.width - 10);
        foodY = randomTen(0, canvas.height - 10);
        snake.forEach(p => {
            if (p.x === foodX && p.y === foodY) createFood();
        });
    }

    function advanceSnake() {
        const head = { x: snake[0].x + dx, y: snake[0].y + dy };
        snake.unshift(head);
        const ate = snake[0].x === foodX && snake[0].y === foodY;
        if (ate) {
            score += 10;
            document.getElementById('score').innerHTML = score;
            createFood();
        } else {
            snake.pop();
        }
    }

    function changeDirection(e) {
    if (changingDirection) return;
    changingDirection = true;
    const L=37,U=38,R=39,D=40;
    const k = e.keyCode;
    const goingUp = dy===-10, goingDown = dy===10;
    const goingRight = dx===10, goingLeft = dx===-10;
    if (k===L && !goingRight) { dx=-10; dy=0; }
    if (k===U && !goingDown)  { dx=0;  dy=-10; }
    if (k===R && !goingLeft)  { dx=10; dy=0; }
    if (k===D && !goingUp)    { dx=0;  dy=10; }
    }

    function didGameEnd() {
    for (let i = 4; i < snake.length; i++) {
        if (snake[i].x===snake[0].x && snake[i].y===snake[0].y)
        return true;
    }
    return snake[0].x < 0 || snake[0].x > canvas.width-10
        || snake[0].y < 0 || snake[0].y > canvas.height-10;
    }

    function main() {
    if (didGameEnd()) {
        ctx.fillStyle = 'white';
        ctx.font = '20px monospace';
        ctx.fillText('Game Over! Score: '+score, 50, 150);
        return;
    }
    setTimeout(() => {
        changingDirection = false;
        clearCanvas();
        drawFood();
        advanceSnake();
        drawSnake();
        main();
    }, 100);
    }

    document.addEventListener('keydown', changeDirection);
    createFood();
    main();
  </script>
</body>
</html>
